name: Rust

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Rust toolchain
        run: rustup show active-toolchain
      - name: Formatting
        run: ./scripts/check.sh fmt
      - name: Clippy
        run: ./scripts/check.sh lint
      - name: Unit and documentation tests
        run: ./scripts/check.sh test
      - name: Documentation
        run: ./scripts/check.sh doc

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Pingora uses the affected protobuf crate only to encode metrics; no
          # untrusted protobuf input reaches the vulnerable decoder.
          # time 0.3.47 raises its MSRV to Rust 1.88. Switchyard uses time only
          # for certificate timestamps and exposes no untrusted RFC 2822 parser.
          ignore: RUSTSEC-2024-0437,RUSTSEC-2026-0194,RUSTSEC-2026-0195

  routing-proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Rust toolchain
        run: rustup show active-toolchain
      - name: Complete Phase 4 proof
        run: ./scripts/phase4-proof.sh
